name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          # Supabase anon key is a public client key (already shipped in the web bundle)
          VITE_SUPABASE_URL: https://ykgbwziouggispmdabps.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZ2J3emlvdWdnaXNwbWRhYnBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NjUwODQsImV4cCI6MjA5NzU0MTA4NH0.Rrnxz7bedy3JDp2IxfKqW6kRjglItLJkuVttRVA8mFw
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tingsync-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
